<!DOCTYPE html>
<html>
    <head>
    <meta charset="UTF-8">
    <link href="style.css" rel="stylesheet">
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <title>TI-30XS Multiview Calculator</title>
    </head>
    <body>

        <div class="outer-border" id="outer">
            <div class="inner-border" id="inner-color">
                <div class="calculator">
                    <div class="product-name">
                        <h3>TI-30XS</h3>
                        <p>MultiView</p>
                    </div>
                    <div class="solar-panel" id="solar">
                        <div class="panel-line"></div>
                        <div class="panel-line"></div>
                        <div class="panel-line"></div>
                        <div class="panel-line"></div>
                        <div class="panel-line"></div>
                    </div>
                    <div class="brand-name">TEXAS INSTRUMENTS</div>
                    <div class="screen-display" id="screen">
                        <div class="indicators-display" id="indicatorsDisplay"></div>
                        <div class="previous-display" id="previousDisplay"></div>
                        <div class="calculator-display" id="mainDisplay"></div>
                    </div>

                    <div class="calculator-keys">
                        <div class="row-1">
                            <div class="column-1">
                                <button class="second" id="secondBtn" data-action="2nd">2nd</button>
                                <button class="NaN" data-action="mode">mode</button>
                                <button class="NaN" data-action="delete">delete</button>
                                <button class="NaN" data-action="log">
                                    <span class="primary-label">log</span>
                                    <span class="second-label">10ˣ</span>
                                </button>
                                <button class="NaN" data-action="probability">prb</button>
                                <button class="NaN" data-action="data">data</button>
                            </div>

                            <div class="column-2">
                                <div class="design">
                                    <div class="circle">
                                        <div class="container">
                                            <div class="top row">
                                            <button class="navigation-arrow" id="up" data-action="up"></button>
                                            </div>
                                            <div class="middle row">
                                                <button class="navigation-arrow" id="left" data-action="left"></button>
                                            <button class="navigation-arrow" id="right" data-action="right"></button>
                                            </div>
                                            <div class="bottom row">
                                            <button class="navigation-arrow" id="down" data-action="down"></button>
                                            </div>

                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="row-2">
                            <button class="NaN" data-action="ln">
                                <span class="primary-label">ln</span>
                                <span class="second-label">eˣ</span>
                            </button>
                            <button class="NaN" data-action="n/d">
                                <span class="primary-label">n/d</span>
                                <span class="second-label">F↔D</span>
                            </button>
                            <button class="NaN" data-action="exponent">x10^n</button>
                            <button class="NaN" data-action="table">table</button>
                            <button class="NaN" data-action="clear">clear</button>
                            <button class="NaN" data-action="pi">π</button>
                            <button class="NaN" data-action="sin">
                                <span class="primary-label">sin</span>
                                <span class="second-label">sin⁻¹</span>
                            </button>
                            <button class="NaN" data-action="cos">
                                <span class="primary-label">cos</span>
                                <span class="second-label">cos⁻¹</span>
                            </button>
                            <button class="NaN" data-action="tan">
                                <span class="primary-label">tan</span>
                                <span class="second-label">tan⁻¹</span>
                            </button>
                            <button class="operator" data-action="division">÷</button>
                            <button class="NaN" data-action="power">^</button>
                            <button class="NaN" data-action="negative-exponent">x^-1</button>
                            <button class="NaN" data-action="open-paren">(</button>
                            <button class="NaN" data-action="close-paren">
                                <span class="primary-label">)</span>
                                <span class="second-label">%</span>
                            </button>
                            <button class="operator" data-action="multiplication">×</button>
                            <button class="NaN" data-action="squared">x^2</button>
                            <button class="number">7</button>
                            <button class="number">8</button>
                            <button class="number">9</button>
                            <button class="operator" data-action="subtraction">-</button>
                            <button class="NaN" data-action="sqrt">
                                <span class="primary-label">√</span>
                                <span class="second-label">∛</span>
                            </button>
                            <button class="number">4</button>
                            <button class="number">5</button>
                            <button class="number">6</button>
                            <button class="operator" data-action="addition">+</button>
                            <button class="NaN" data-action="off">off</button>
                            <button class="number">1</button>
                            <button class="number">2</button>
                            <button class="number">3</button>
                                <div class="button-container">
                                    <button class="accessory" data-action="forward" id="forward">&#10094;</button>
                                    <button class="accessory" data-action="backward" id="backward">&#10095;</button>
                                </div>
                            <button class="NaN" data-action="on">on</button>
                            <button class="number">0</button>
                            <button class="decimal accessory" data-action="decimal">.</button>
                            <button class="negative accessory" data-action="negative">(&#x2212;)</button>
                            <button class="enter accessory" id="enter" data-action="calculate">enter</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
        <div class="color-selector">
            <button class ="colorway" id="option-1" onclick="colorChanger('blue')"></button>
            <button class="colorway" id="option-2" onclick="colorChanger('pink')"></button>
        </div>
        <button id="secondScreenToggle" class="second-screen-btn">⊞ Grand écran</button>

        <div id="secondScreen" class="second-screen hidden">
            <div class="second-screen-header">
                <span class="second-screen-title">TI-30XS</span>
                <button id="secondScreenClose">✕</button>
            </div>
            <div class="second-screen-body">
                <div class="ss-indicators" id="ssIndicators"></div>
                <div class="ss-expression" id="ssExpression"></div>
                <div class="ss-result" id="ssResult">0</div>
            </div>
        </div>

        <script defer src="javascript.js"></script>
    </body>
</html>
